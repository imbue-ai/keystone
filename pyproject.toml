[project]
name = "bootstrap-devcontainer"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "diskcache>=5.6.3",
    "pydantic>=2.0.0",
    "pytest>=9.0.2",
    "rich>=14.0.0",
    "typer>=0.21.1",
]

[tool.pytest.ini_options]
markers = [
    "manual: marks tests as manual (select with '-m manual')",
]
testpaths = ["tests"]
pythonpath = ["."]
log_cli = true
log_cli_level = "INFO"
