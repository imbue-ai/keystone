repos:
  - repo: https://github.com/kynan/nbstripout
    rev: 0.8.1
    hooks:
      - id: nbstripout

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: ./scripts/typecheck
        language: system
        types: [python]
        pass_filenames: false

      - id: pytest-discovery
        name: pytest discovery
        entry: ./scripts/pytest-discovery
        language: system
        types: [python]
        pass_filenames: false
