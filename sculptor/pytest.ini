[pytest]
asyncio_mode = auto
filterwarnings =
    ignore::DeprecationWarning:wandb.*:
    ignore::DeprecationWarning:graphql.*:
    ignore::DeprecationWarning:notebook.*:
    ignore::DeprecationWarning:nptyping.*:
    ignore:.*record_property is incompatible with junit_family.*::pytest.PytestWarning
markers =
    # we could consider using @pytest.mark.timeout markers instead of these, if there's a way to filter by them.
    # unmarked tests should be <1 second
    up_to_10_seconds: should complete in 10 seconds
    up_to_30_seconds: should complete in 30 seconds
    up_to_5_minutes: should complete in 5 minutes
    smoke: quick high-level checks
    regression: thorough regression suite
    skip_browser(browser): skip test on specific browser
    only_browser(browser): run test only on specific browser
    integration: integration tests, including frontend tests running against a cached backend
    acceptance: acceptance tests as well as our integration tests, running against a remote backend
    skip_if_acceptance: opt out of acceptance tests suite, for use by integration tests
    v1: Tests that run against the "v1" backend, directly from Python Source.
    dist: Tests that run against the "dist" tar.gz backend
    electron: Tests that run against the Electron app
    user_story: makes a note about the user story that is implemented by the test
    isolated: This test runs in isolated mode: See IsolationLevel
    non_isolated: This test runs in non-isolated mode: See IsolationLevel


python_files = *_tests.py test_*.py *_benchmarks.py
python_classes = Test* Benchmark*
python_functions = test_* benchmark_*


addopts =
    --ignore=quarantine
    --ignore-glob=**/test_data/**
    --ignore=_vendor
    --ignore=build
    --import-mode=importlib
    # TODO: Consider adding something like this after analyzing the duration of all successful tests.
    # --timeout=600

    # These options are for pytest-playwright
    --browser=chromium
    --tracing=retain-on-failure
    # End pytest-playwright options

    # These options are for pytest-performancetotal
    --performance-results-dir=performance_results
    --performance-recent-days=7

norecursedirs = quarantine,_vendor
