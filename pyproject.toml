[tool.uv.workspace]
members = ["bootstrap_devcontainer", "evals"]

[tool.uv]
dev-dependencies = [
    "ruff>=0.9.0",
    "pyright>=1.1.390",
    "pre-commit>=4.0.0",
]

[tool.ruff]
target-version = "py312"
line-length = 100
exclude = ["github_datasets", "samples"]

[tool.ruff.lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "UP",     # pyupgrade
    "ARG",    # flake8-unused-arguments
    "SIM",    # flake8-simplify
    "TCH",    # flake8-type-checking
    "PTH",    # flake8-use-pathlib
    "RUF",    # ruff-specific rules
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "B008",   # function call in default argument (standard typer pattern)
]

[tool.ruff.lint.isort]
known-first-party = ["bootstrap_devcontainer", "evals"]

# Pyright config in pyrightconfig.json (needs explicit include to avoid hanging on symlinks)
